<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- London 2012 Olympics Official Logo -->
  <!-- The iconic geometric abstract interlocking design -->
  
  <!-- Blue shape (top left) -->
  <polygon points="30,60 60,60 60,100 45,115 30,100" fill="#0066FF"/>
  
  <!-- Pink shape (top right) -->
  <polygon points="85,40 115,40 115,85 100,100 85,85" fill="#FF1493"/>
  
  <!-- Yellow shape (middle right) -->
  <polygon points="130,65 160,65 160,110 145,125 130,110" fill="#FFD700"/>
  
  <!-- Green shape (bottom left) -->
  <polygon points="30,115 60,100 75,115 60,130 45,130" fill="#00AA44"/>
  
  <!-- Orange shape (bottom middle) -->
  <polygon points="85,105 115,90 130,105 115,120 100,120" fill="#FF8800"/>
  
  <!-- Purple shape (bottom right) -->
  <polygon points="145,125 160,110 175,125 160,140 145,140" fill="#9933FF"/>
</svg>