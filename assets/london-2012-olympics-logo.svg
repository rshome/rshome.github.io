<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- London 2012 Olympics Official Logo -->
  <!-- The iconic abstract geometric design with interlocking shapes -->
  
  <!-- Blue shape (represents 2) -->
  <path d="M 30 60 L 70 60 L 70 100 L 50 100 L 50 140 L 30 140 Z" fill="#0066FF"/>
  
  <!-- Red/Purple shape (represents 0) -->
  <ellipse cx="90" cy="100" rx="25" ry="40" fill="none" stroke="#FF0000" stroke-width="8"/>
  
  <!-- Yellow shape (represents 1) -->
  <rect x="130" y="60" width="15" height="80" fill="#FFD700"/>
  
  <!-- Pink/Magenta shape (represents 2) -->
  <path d="M 155 60 L 185 60 L 185 100 L 165 100 L 165 140 L 155 140 Z" fill="#FF1493"/>
</svg>