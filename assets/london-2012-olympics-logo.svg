<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- London 2012 Olympics Logo -->
  <!-- The iconic "2012" design with the Olympic rings integrated -->
  
  <!-- Background circle -->
  <circle cx="100" cy="100" r="95" fill="none" stroke="#0066cc" stroke-width="2"/>
  
  <!-- Main "2012" text styled like the official logo -->
  <g id="olympics-2012">
    <!-- The design incorporates the abstract geometric style of the actual logo -->
    <text x="100" y="130" font-size="80" font-weight="bold" text-anchor="middle" fill="#0066cc" font-family="Arial, sans-serif" letter-spacing="-2">2012</text>
  </g>
  
  <!-- Olympic rings -->
  <g id="olympic-rings" opacity="0.6">
    <circle cx="60" cy="50" r="8" fill="none" stroke="#0066cc" stroke-width="2"/>
    <circle cx="100" cy="50" r="8" fill="none" stroke="#0066cc" stroke-width="2"/>
    <circle cx="140" cy="50" r="8" fill="none" stroke="#0066cc" stroke-width="2"/>
    <circle cx="80" cy="62" r="8" fill="none" stroke="#0066cc" stroke-width="2"/>
    <circle cx="120" cy="62" r="8" fill="none" stroke="#0066cc" stroke-width="2"/>
  </g>
</svg>